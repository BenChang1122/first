<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>周興哲音樂挑戰 - 歌詞填空</title>
    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a;
            color: white;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .game-card {
            background: #2c3e50;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { color: #3498db; }
        .lyric-box {
            font-size: 1.2em;
            margin: 20px 0;
        }
        input {
            font-size: 1em;
            padding: 5px;
            width: 80px;
            text-align: center;
            border: none;
            border-bottom: 2px solid #3498db;
            background: transparent;
            color: #f1c40f;
            outline: none;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .video-container {
            margin-top: 20px;
            display: none; /* 預設隱藏影片 */
        }
        .message {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color: #bdc3c7; text-decoration: none;">← 回到首頁</a>
    <h1>周興哲歌詞填空挑戰</h1>
    <p>填入正確歌詞，解鎖音樂影片！</p>

    <div class="game-card" id="game-1">
        <h2>《以後別做朋友》</h2>
        <div class="lyric-box">
            以後別做朋友，朋友不能 <input type="text" id="input-1" placeholder="??">
        </div>
        <button onclick="checkAnswer(1)">提交答案</button>
        <div class="message" id="msg-1"></div>
        <div class="video-container" id="video-1"></div>
    </div>

    <div class="game-card" id="game-2">
        <h2>《你，好不好？》</h2>
        <div class="lyric-box">
            能不能繼續，對我 <input type="text" id="input-2" placeholder="??"> ，不收回
        </div>
        <button onclick="checkAnswer(2)">提交答案</button>
        <div class="message" id="msg-2"></div>
        <div class="video-container" id="video-2"></div>
    </div>

    <div class="game-card" id="game-3">
        <h2>《如果雨之後》</h2>
        <div class="lyric-box">
            如果雨之後，淚還不停 <input type="text" id="input-3" placeholder="??">
        </div>
        <button onclick="checkAnswer(3)">提交答案</button>
        <div class="message" id="msg-3"></div>
        <div class="video-container" id="video-3"></div>
    </div>

    <div class="game-card" id="game-4">
        <h2>《你不屬於我》</h2>
        <div class="lyric-box">
            你不屬於我，屬於我的 <input type="text" id="input-4" placeholder="??">
        </div>
        <button onclick="checkAnswer(4)">提交答案</button>
        <div class="message" id="msg-4"></div>
        <div class="video-container" id="video-4"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const songData = {
        1: { id: "Ew4VvF0DPMc", answer: "牽手", startTime: 74 },
        2: { id: "wSBXfzgqHtE", answer: "任性", startTime: 73 },
        3: { id: "gdGdO6KjF1I", answer: "流下", startTime: 58 },
        4: { id: "6O_Zx9St9ik", answer: "脆弱", startTime: 77 }
    };

    let players = {};

    function checkAnswer(num) {
        const userInput = document.getElementById('input-' + num).value.trim();
        const msg = document.getElementById('msg-' + num);
        const videoDiv = document.getElementById('video-' + num);
        const data = songData[num];

        if (userInput === data.answer) {
            msg.style.color = "#2ecc71";
            msg.innerText = "正確！正在播放音樂...";
            videoDiv.style.display = "block";
            
            // 建立該歌曲的播放器
            if (!players[num]) {
                players[num] = new YT.Player('video-' + num, {
                    height: '240',
                    width: '100%',
                    videoId: data.id,
                    playerVars: { 'start': data.startTime, 'autoplay': 1 }
                });
            } else {
                players[num].seekTo(data.startTime);
                players[num].playVideo();
            }
        } else {
            msg.style.color = "#e74c3c";
            msg.innerText = "填寫錯誤，再試一次！";
            // 答錯時隱藏影片並停止
            videoDiv.style.display = "none";
            if (players[num]) players[num].stopVideo();
        }
    }
</script>

</body>
</html>
